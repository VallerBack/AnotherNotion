name: Deploy AnotherNotion to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '2-59/5 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-reminder-snapshot
  cancel-in-progress: false

jobs:
  build:
    outputs:
      should_deploy: ${{ steps.snapshot.outputs.should_deploy }}
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Validate public Supabase configuration
        shell: bash
        run: |
          if [[ -z "$VITE_SUPABASE_URL" || -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]]; then
            echo "::error::Configure VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY as GitHub Actions Secrets."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Build encrypted reminder snapshot
        id: snapshot
        env:
          REMINDER_FEED_TOKEN: ${{ secrets.REMINDER_FEED_TOKEN }}
          REMINDER_JSON_AES_KEY: ${{ secrets.REMINDER_JSON_AES_KEY }}
          SNAPSHOT_FETCH_FEED: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
          SNAPSHOT_FORCE_DEPLOY: ${{ github.event_name != 'schedule' && 'true' || 'false' }}
          SNAPSHOT_OUTPUT_FILE: dist/reminders.json
          SNAPSHOT_PREVIOUS_URL: https://vallerback.github.io/AnotherNotion/reminders.json
        run: node scripts/build_reminder_snapshot.mjs

      - name: Upload Pages artifact
        if: steps.snapshot.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    if: needs.build.outputs.should_deploy == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
